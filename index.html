<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary meta ─────────────────────────────────────────────────── -->
    <title>WHO WAS I — Living Memorials</title>
    <meta name="description" content="Create a living memorial with voice, photos, AI conversation, and a QR code that brings it to life at any gathering — a wake, a birthday, a graveside visit." />
    <meta name="author" content="WHO WAS I" />
    <meta name="theme-color" content="#08080f" />
    <meta name="color-scheme" content="dark" />

    <!-- ── PWA ──────────────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WHO WAS I" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

    <!-- ── Favicon ───────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.svg" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.svg" />

    <!-- ── Open Graph (default — overridden per-memorial via useSEO hook) ─ -->
    <meta property="og:type"         content="website" />
    <meta property="og:site_name"    content="WHO WAS I" />
    <meta property="og:title"        content="WHO WAS I — Living Memorials" />
    <meta property="og:description"  content="Create a living memorial with voice, AI conversation, and a QR code that brings it to life anywhere." />
    <meta property="og:image"        content="https://whowasi.uk/og-default.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url"          content="https://whowasi.uk" />

    <!-- ── Twitter / X card ─────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="WHO WAS I — Living Memorials" />
    <meta name="twitter:description" content="Create a living memorial with voice, AI conversation, and a QR code." />
    <meta name="twitter:image"       content="https://whowasi.uk/og-default.jpg" />

    <!-- ── Fonts ─────────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ── Vercel Analytics (one script tag — free) ──────────────────────── -->
    <script defer src="/_vercel/insights/script.js"></script>

    <!-- ── Vercel Speed Insights ─────────────────────────────────────────── -->
    <script defer src="/_vercel/speed-insights/script.js"></script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
